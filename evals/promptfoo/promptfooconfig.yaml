description: "Episodic Pivot — AI Agent Eval & Security (promptfoo 0.105)"

# Default provider — news_analyser. Screener tests override this per-test.
providers:
  - id: python:providers/news_analyser_provider.py
    config:
      pythonExecutable: "C:\\Users\\jovml\\AppData\\Local\\Python\\bin\\python3.exe"

# Passthrough prompt — providers use context.vars directly.
prompts:
  - "{{ticker|default('')}} {{text|default(prompt|default(''))}}"

defaultTest:
  options:
    timeout: 35000

# ---------------------------------------------------------------------------
# News analyser functional tests  (5 cases — uses global provider)
# ---------------------------------------------------------------------------
tests:
  - description: "[F01] NVDA: earnings_beat -> strong_buy"
    vars:
      ticker: "NVDA"
      company: "NVIDIA Corporation"
      pct: 9.4
      title: "NVIDIA Q3 Revenue $18.1B Beats $17.0B Estimate; Data Center Sales Triple YoY; FY2025 Guidance Raised"
      text: >-
        NVIDIA Corporation reported third-quarter revenue of $18.12 billion, surpassing analyst
        estimates of $17.01 billion by 6.5%. Data center revenue reached $14.51 billion, up 279%
        year-over-year. Adjusted EPS of $0.81 beat the consensus of $0.74. Management raised
        full-year guidance to $125 billion. CEO Jensen Huang cited accelerating demand for AI
        infrastructure from hyperscalers.
    assert:
      - type: is-json
        metric: schema_valid
      - type: javascript
        metric: catalyst_correct
        value: |
          try { return JSON.parse(output).catalyst_type === 'earnings_beat'; }
          catch(e) { return false; }
      - type: javascript
        metric: signal_correct
        value: |
          try { return JSON.parse(output).trading_signal === 'strong_buy'; }
          catch(e) { return false; }

  - description: "[F02] SMCI: dilution -> skip"
    vars:
      ticker: "SMCI"
      company: "Super Micro Computer Inc"
      pct: -5.2
      title: "Super Micro Prices $1.5B At-the-Market Offering at $500/share"
      text: >-
        Super Micro Computer announced a $1.5 billion at-the-market equity offering, issuing
        approximately 3 million new common shares at $500 per share to fund capacity expansion
        and working capital needs. The offering represents roughly 5% dilution to existing shareholders.
        No changes to revenue guidance were provided alongside the announcement.
    assert:
      - type: is-json
        metric: schema_valid
      - type: javascript
        metric: catalyst_correct
        value: |
          try { return JSON.parse(output).catalyst_type === 'dilution'; }
          catch(e) { return false; }
      - type: javascript
        metric: signal_correct
        value: |
          try { return JSON.parse(output).trading_signal === 'skip'; }
          catch(e) { return false; }

  - description: "[F03] MRNA: fda_approval -> strong_buy"
    vars:
      ticker: "MRNA"
      company: "Moderna Inc"
      pct: 14.1
      title: "FDA Approves Moderna mRESVIA RSV Vaccine for Adults 60+"
      text: >-
        The U.S. Food and Drug Administration has granted approval to Moderna's mRESVIA, an mRNA-based
        respiratory syncytial virus vaccine for adults 60 years and older. This marks the second approved
        RSV vaccine in the US market. Analysts project peak annual revenue of $2.8-3.2 billion.
        Commercial launch is expected within 60 days. Moderna CEO called it a pivotal validation of the
        mRNA platform beyond COVID.
    assert:
      - type: is-json
        metric: schema_valid
      - type: javascript
        metric: catalyst_correct
        value: |
          try { return JSON.parse(output).catalyst_type === 'fda_approval'; }
          catch(e) { return false; }
      - type: javascript
        metric: signal_correct
        value: |
          try { return JSON.parse(output).trading_signal === 'strong_buy'; }
          catch(e) { return false; }

  - description: "[F07] SAVA: fda_rejection -> strong_short"
    vars:
      ticker: "SAVA"
      company: "Cassava Sciences Inc"
      pct: -31.0
      title: "FDA Issues Complete Response Letter for Simufilam Alzheimer's Drug; Phase 3 Trial Fails"
      text: >-
        Cassava Sciences received a Complete Response Letter from the FDA regarding its BLA submission
        for simufilam for Alzheimer's disease. The Phase 3 RETHINK-ALZ trial failed its primary endpoint
        of cognitive improvement at 52 weeks versus placebo. The FDA cited insufficient evidence of
        clinical benefit and requested an additional Phase 3 trial. This represents Cassava's primary
        pipeline asset.
    assert:
      - type: is-json
        metric: schema_valid
      - type: javascript
        metric: catalyst_correct
        value: |
          try { return JSON.parse(output).catalyst_type === 'fda_rejection'; }
          catch(e) { return false; }
      - type: javascript
        metric: signal_correct
        value: |
          try {
            const sig = JSON.parse(output).trading_signal;
            return sig === 'strong_short' || sig === 'short';
          } catch(e) { return false; }

  - description: "[F06] PLTR: analyst_upgrade -> watch"
    vars:
      ticker: "PLTR"
      company: "Palantir Technologies Inc"
      pct: 2.1
      title: "JPMorgan Upgrades Palantir to Overweight, Raises Price Target from $22 to $28"
      text: >-
        JPMorgan analyst Joe Gallo upgraded Palantir Technologies from Neutral to Overweight
        and raised the 12-month price target from $22 to $28. The analyst cited improved government
        contract pipeline and accelerating commercial AI adoption. No changes to consensus revenue
        estimates or company guidance accompanied the upgrade.
    assert:
      - type: is-json
        metric: schema_valid
      - type: javascript
        metric: catalyst_correct
        value: |
          try { return JSON.parse(output).catalyst_type === 'analyst_upgrade'; }
          catch(e) { return false; }
      - type: javascript
        metric: signal_correct
        value: |
          try {
            const sig = JSON.parse(output).trading_signal;
            return sig === 'watch' || sig === 'buy';
          } catch(e) { return false; }

# ---------------------------------------------------------------------------
# Screener config producer functional tests  (4 cases — override provider)
# ---------------------------------------------------------------------------

  - description: "[S01] NASDAQ small caps >5% PM, vol >500K -> success"
    providers:
      - id: python:providers/screener_provider.py
        config:
          pythonExecutable: "C:\\Users\\jovml\\AppData\\Local\\Python\\bin\\python3.exe"
    vars:
      prompt: "NASDAQ small caps under $300M market cap with pre-market gain over 5% and volume above 500K shares"
    assert:
      - type: is-json
        metric: valid_json
      - type: javascript
        metric: success_flag
        value: |
          try { return JSON.parse(output).success === true; }
          catch(e) { return false; }
      - type: javascript
        metric: has_premarket_change_filter
        value: |
          try {
            const cfg = JSON.parse(output).config || {};
            const filters = cfg.filters || [];
            return filters.some(f => f.left === 'premarket_change');
          } catch(e) { return false; }
      - type: javascript
        metric: has_market_cap_filter
        value: |
          try {
            const cfg = JSON.parse(output).config || {};
            const filters = cfg.filters || [];
            return filters.some(f => f.left === 'market_cap_basic');
          } catch(e) { return false; }

  - description: "[S02] Biotech float <20M PM >10% -> success"
    providers:
      - id: python:providers/screener_provider.py
        config:
          pythonExecutable: "C:\\Users\\jovml\\AppData\\Local\\Python\\bin\\python3.exe"
